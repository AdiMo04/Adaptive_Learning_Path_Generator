services:
- type: web
    name: adaptive-learning-api
    runtime: python
    repo: https://github.com/AdiMo04/Adaptive_learning_path_generator.git
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
